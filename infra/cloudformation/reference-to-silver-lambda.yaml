AWSTemplateFormatVersion: "2010-09-09"
Description: Deploy the YouTube category reference JSON to Silver Parquet Lambda.

Parameters:
  FunctionName:
    Type: String
    Default: yt-reference-to-silver
    Description: Name of the Lambda function.

  CodeS3Bucket:
    Type: String
    Description: S3 bucket containing the Lambda zip package.

  CodeS3Key:
    Type: String
    Description: S3 key for the Lambda zip package.

  AwsSdkPandasLayerArn:
    Type: String
    Description: AWS SDK for pandas Lambda layer ARN for this region/runtime.

  BronzeBucketName:
    Type: String
    Description: Source S3 bucket for Bronze raw files.

  SilverBucketName:
    Type: String
    Description: Destination S3 bucket for Silver Parquet files.

  ReferencePrefix:
    Type: String
    Default: youtube/raw_reference_data
    Description: Bronze prefix containing Kaggle category JSON files.

  ApiCategoriesPrefix:
    Type: String
    Default: youtube/api_raw/categories
    Description: Bronze prefix containing YouTube API category JSON files.

  CategoriesOutputPrefix:
    Type: String
    Default: youtube/categories
    Description: Silver output prefix for category Parquet files.

  SnsAlertTopicArn:
    Type: String
    Default: ""
    Description: Optional SNS topic ARN for reference transform failure alerts.

  LambdaMemorySize:
    Type: Number
    Default: 1024
    MinValue: 512
    MaxValue: 10240
    Description: Lambda memory size in MB.

  LambdaTimeout:
    Type: Number
    Default: 300
    MinValue: 30
    MaxValue: 900
    Description: Lambda timeout in seconds.

  LogRetentionDays:
    Type: Number
    Default: 14
    Description: CloudWatch Logs retention period.

Conditions:
  HasSnsAlertTopic: !Not [!Equals [!Ref SnsAlertTopicArn, ""]]

Resources:
  ReferenceToSilverFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${FunctionName}-role"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${FunctionName}-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadBronzeCategoryObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "arn:${AWS::Partition}:s3:::${BronzeBucketName}/${ReferencePrefix}/*"
                  - !Sub "arn:${AWS::Partition}:s3:::${BronzeBucketName}/${ApiCategoriesPrefix}/*"
              - Sid: WriteSilverObjects
                Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "arn:${AWS::Partition}:s3:::${SilverBucketName}/*"
              - !If
                - HasSnsAlertTopic
                - Sid: PublishFailureAlerts
                  Effect: Allow
                  Action:
                    - sns:Publish
                  Resource: !Ref SnsAlertTopicArn
                - !Ref AWS::NoValue

  ReferenceToSilverFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref FunctionName
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Code:
        S3Bucket: !Ref CodeS3Bucket
        S3Key: !Ref CodeS3Key
      Role: !GetAtt ReferenceToSilverFunctionRole.Arn
      Layers:
        - !Ref AwsSdkPandasLayerArn
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      Environment:
        Variables:
          SILVER_BUCKET: !Ref SilverBucketName
          REFERENCE_PREFIX: !Ref ReferencePrefix
          API_CATEGORIES_PREFIX: !Ref ApiCategoriesPrefix
          CATEGORIES_OUTPUT_PREFIX: !Ref CategoriesOutputPrefix
          SNS_TOPIC_ARN: !Ref SnsAlertTopicArn

  ReferenceToSilverLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${FunctionName}"
      RetentionInDays: !Ref LogRetentionDays

  AllowS3InvokeReferenceToSilver:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ReferenceToSilverFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:s3:::${BronzeBucketName}"

Outputs:
  FunctionName:
    Description: Deployed Lambda function name.
    Value: !Ref ReferenceToSilverFunction

  FunctionArn:
    Description: Deployed Lambda function ARN.
    Value: !GetAtt ReferenceToSilverFunction.Arn

  RoleArn:
    Description: Lambda execution role ARN.
    Value: !GetAtt ReferenceToSilverFunctionRole.Arn
